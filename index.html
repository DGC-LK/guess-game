<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess Game</title>
    <style>
        body {
            font-size: 16px;
            padding: 0;
            margin: 0;
        }

        .container {
            padding: 20px;
        }

        .button {
            padding: 15px 30px;
            font-size: 1.2rem;
        }

        @media (max-width: 600px) {
            body {
                font-size: 14px;
            }
            .button {
                padding: 12px 24px;
                font-size: 1rem;
            }
            .container {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to the Guess Game!</h1>
        <button class="button">Start Game</button>
    </div>
</body>
</html>
